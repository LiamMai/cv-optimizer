version: '3.9'

# Production compose — all services internal except nginx (80/443).
# SSL via Let's Encrypt (certbot). No ports exposed directly.
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml run --rm certbot certonly \
#     --webroot -w /var/www/certbot -d yourdomain.com

services:
  # ------------------------------------------------------------------
  # Nginx — reverse proxy + SSL termination
  # ------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - web
      - api
    networks:
      - public
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3

  # ------------------------------------------------------------------
  # Certbot — SSL certificate issuance and renewal
  # ------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run manually to issue: see usage comment at top of file.
    # Renewal: add a host cron → docker-compose run certbot renew
    entrypoint: '/bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done"'

  # ------------------------------------------------------------------
  # Next.js web — internal only
  # ------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    restart: always
    expose:
      - '3000'
    env_file:
      - ./apps/web/.env.prod
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ------------------------------------------------------------------
  # Express API — internal only
  # ------------------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    restart: always
    expose:
      - '3001'
    env_file:
      - ./apps/api/.env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - public
      - internal
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ------------------------------------------------------------------
  # PostgreSQL — internal only, never exposed
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: always
    expose:
      - '5432'
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true   # no external connectivity — postgres is isolated

volumes:
  postgres_data:
  uploads_data:
  certbot_webroot:
  certbot_certs:
