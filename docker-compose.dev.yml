services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cvo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cvo_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cv_optimizer}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cvo}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
